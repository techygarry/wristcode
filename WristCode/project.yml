name: WristCode
options:
  bundleIdPrefix: com.wristcode
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  WristCode Watch App:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - path: "WristCode Watch App"
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wristcode.watchapp
        PRODUCT_NAME: WristCode
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        DEVELOPMENT_TEAM: FLF59NSA8T
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: WristCode-Info.plist
      properties:
        WKApplication: true
        WKWatchOnly: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - wristcode
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
